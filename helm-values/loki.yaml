resources:
  - |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: loki-config
      namespace: monitoring
    data:
      loki-local-config.yaml: |
        auth_enabled: false
        common:
          path_prefix: /loki
          replication_factor: 1
          ring:
            kvstore:
              store: inmemory
        server:
          http_listen_port: 3100
          log_level: info
        schema_config:
          configs:
            - from: 2020-10-24
              store: boltdb-shipper
              object_store: filesystem
              schema: v11
              index:
                prefix: index_
                period: 24h
        storage_config:
          boltdb_shipper:
            active_index_directory: /loki/index
            cache_location: /loki/cache
          filesystem:
            directory: /loki/chunks
        limits_config:
          allow_structured_metadata: false
          reject_old_samples: true
          reject_old_samples_max_age: 168h
          ingestion_rate_mb: 10
          ingestion_burst_size_mb: 20
        table_manager:
          retention_deletes_enabled: true
          retention_period: 168h
  - |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: loki
      namespace: monitoring
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: loki
      template:
        metadata:
          labels:
            app: loki
        spec:
          containers:
            - name: loki
              image: grafana/loki:3.0.0
              ports:
                - containerPort: 3100
                  name: http
              args:
                - -config.file=/etc/loki/loki-local-config.yaml
              volumeMounts:
                - name: loki-config
                  mountPath: /etc/loki
                - name: loki-storage
                  mountPath: /loki
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: loki-config
              configMap:
                name: loki-config
            - name: loki-storage
              emptyDir: {}
  - |
    apiVersion: v1
    kind: Service
    metadata:
      name: loki
      namespace: monitoring
    spec:
      type: ClusterIP
      ports:
        - name: http
          port: 3100
          targetPort: http
      selector:
        app: loki

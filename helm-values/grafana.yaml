                "showTime": true,
                "sortOrder": "Descending",
                "wrapLogMessage": true
              },
              "targets": [
                {
                  "datasource": "Loki",
                  "editorMode": "code",
                  "expr": "{service_name=~\"api-gateway|dashboard-api|order-service|payment-service|inventory-service|shipping-service|notification-service|scheduler|worker\"} | json | line_format \"{{.log}}\"",

              },
              "id": 2,
              "options": {
                "dedupStrategy": "none",
                "enableLogDetails": true,
                "prettifyLogMessage": false,
                "showCommonLabels": false,
                "showLabels": false,
                "showTime": true,
                "sortOrder": "Descending",
                "wrapLogMessage": true
              },
              "targets": [
                {
                  "datasource": "Loki",
                  "editorMode": "code",
                  "expr": "{service_name=\"order-service\"} | json | line_format \"{{.log}}\"",
                  "queryType": "range",
                  "refId": "A"
                }
              ],
              "title": "Order Service Logs",
              "type": "logs"
            },
            {

resources:
  - |
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: fluent-bit
      namespace: monitoring
  - |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: fluent-bit
    rules:
      - apiGroups: [""]
        resources:
          - namespaces
          - pods
          - pods/log
        verbs:
          - get
          - list
          - watch
  - |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: fluent-bit
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: fluent-bit
    subjects:
      - kind: ServiceAccount
        name: fluent-bit
        namespace: monitoring
  - |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: fluent-bit-config
      namespace: monitoring
    data:
      fluent-bit.conf: |
        [SERVICE]
            Flush         5
            Daemon        Off
            Log_Level     info
            Parsers_File  parsers.conf

        [INPUT]
            Name              tail
            Tag               kube.*
            Path              /var/log/containers/*.log
            Parser            cri
            DB                /var/log/flb_kube.db
            Mem_Buf_Limit     20MB
            Skip_Long_Lines   On
            Refresh_Interval  10
            Rotate_Wait       30
            Read_from_Head    On

        [FILTER]
            Name                kubernetes
            Match               kube.*
            Kube_URL            https://kubernetes.default.svc:443
            Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
            Kube_Tag_Prefix     kube.var.log.containers.
            Merge_Log           On
            Keep_Log            Off
            K8S-Logging.Parser  On
            K8S-Logging.Exclude Off
            Labels              On
            Annotations         Off

        [OUTPUT]
            Name                  loki
            Match                 kube.*
            Host                  loki.monitoring.svc.cluster.local
            Port                  3100
            Labels                job=fluent-bit,namespace=$kubernetes['namespace_name'],pod=$kubernetes['pod_name'],container=$kubernetes['container_name'],node=$kubernetes['host']
            Auto_Kubernetes_Labels on
            Line_Format           json
            Drop_Single_Key       off

      parsers.conf: |
        [PARSER]
            Name        cri
            Format      regex
            Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
            Time_Key    time
            Time_Format %Y-%m-%dT%H:%M:%S.%L%z
            Time_Keep   On
  - |
    apiVersion: apps/v1
    kind: DaemonSet
    metadata:
      name: fluent-bit
      namespace: monitoring
    spec:
      selector:
        matchLabels:
          app: fluent-bit
      template:
        metadata:
          labels:
            app: fluent-bit
        spec:
          serviceAccountName: fluent-bit
          tolerations:
            - operator: Exists
          containers:
            - name: fluent-bit
              image: fluent/fluent-bit:3.1.0
              imagePullPolicy: IfNotPresent
              volumeMounts:
                - name: config
                  mountPath: /fluent-bit/etc/
                - name: varlogcontainers
                  mountPath: /var/log/containers
                  readOnly: true
                - name: varlogpods
                  mountPath: /var/log/pods
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
          volumes:
            - name: config
              configMap:
                name: fluent-bit-config
            - name: varlogcontainers
              hostPath:
                path: /var/log/containers
            - name: varlogpods
              hostPath:
                path: /var/log/pods

resources:
  - |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: tempo-config
      namespace: monitoring
    data:
      tempo.yaml: |
        server:
          http_listen_port: 3200
        distributor:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
        ingester:
          trace_idle_period: 10s
          max_block_duration: 5m
        compactor:
          compaction:
            block_retention: 24h
        storage:
          trace:
            backend: local
            wal:
              path: /tmp/tempo/wal
            local:
              path: /tmp/tempo/blocks
        metrics_generator:
          registry:
            external_labels:
              source: tempo
          storage:
            path: /tmp/tempo/generator/wal
            remote_write: []
  - |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: tempo
      namespace: monitoring
      labels:
        app: tempo
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: tempo
      template:
        metadata:
          labels:
            app: tempo
        spec:
          containers:
            - name: tempo
              image: grafana/tempo:2.6.1
              imagePullPolicy: IfNotPresent
              args:
                - -config.file=/etc/tempo/tempo.yaml
              ports:
                - name: http
                  containerPort: 3200
                - name: otlp-grpc
                  containerPort: 4317
                - name: otlp-http
                  containerPort: 4318
              readinessProbe:
                httpGet:
                  path: /ready
                  port: http
                initialDelaySeconds: 10
                periodSeconds: 10
              livenessProbe:
                httpGet:
                  path: /ready
                  port: http
                initialDelaySeconds: 30
                periodSeconds: 20
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 768Mi
              volumeMounts:
                - name: config
                  mountPath: /etc/tempo
                - name: data
                  mountPath: /tmp/tempo
          volumes:
            - name: config
              configMap:
                name: tempo-config
            - name: data
              emptyDir: {}
  - |
    apiVersion: v1
    kind: Service
    metadata:
      name: tempo
      namespace: monitoring
      labels:
        app: tempo
    spec:
      type: ClusterIP
      selector:
        app: tempo
      ports:
        - name: http
          port: 3200
          targetPort: http
        - name: otlp-grpc
          port: 4317
          targetPort: otlp-grpc
        - name: otlp-http
          port: 4318
          targetPort: otlp-http

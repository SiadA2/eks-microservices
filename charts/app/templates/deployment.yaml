apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "app.name" . }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            {{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if .Values.probes.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: {{ default .Values.containerPort .Values.probes.port }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: {{ default .Values.containerPort .Values.probes.port }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: {{ default .Values.containerPort .Values.probes.port }}
            initialDelaySeconds: {{ .Values.probes.startupInitialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startupPeriodSeconds }}
            failureThreshold: {{ .Values.probes.startupFailureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

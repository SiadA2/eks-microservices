name: Docker Build and Push

on:
  pull_request:
    paths:
      - "services/**"
      - "docker-compose.yml"
  push:
    branches:
      - main
    paths:
      - "services/**"
      - "docker-compose.yml"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT || 'dev' }}

jobs:
  build-check-push:
    name: Build, Checkov, Push
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - dashboard-api
          - inventory-service
          - notification-service
          - order-service
          - payment-service
          - scheduler
          - shipping-service
          - worker

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: ./.github/actions/aws-login
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve AWS account id
        if: github.event_name != 'pull_request'
        id: aws
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Install Checkov
        run: python -m pip install --upgrade pip checkov

      - name: Checkov Dockerfile scan
        run: checkov -d "services/${{ matrix.service }}" --framework dockerfile --quiet

      - name: Build image for pull request
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: eks-microservices/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ENVIRONMENT }}-${{ matrix.service }}:${{ github.sha }}
            ${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ENVIRONMENT }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

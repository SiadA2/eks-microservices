helmDefaults:
  createNamespace: true
  wait: true
  atomic: true
  timeout: 300

repositories:
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: cert-manager
    url: https://charts.jetstack.io
  - name: external-dns
    url: https://kubernetes-sigs.github.io/external-dns/
  - name: argocd
    url: https://argoproj.github.io/argo-helm
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: prometheus
    url: https://prometheus-community.github.io/helm-charts
  - name: grafana
    url: https://grafana.github.io/helm-charts


releases:
  - name: ingress-nginx
    namespace: ingress-nginx
    chart: ingress-nginx/ingress-nginx
    version: "4.11.3"
    values:
      - helm-values/nginx.yaml

  - name: cert-manager
    namespace: cert-manager
    chart: cert-manager/cert-manager
    version: "1.18.2"
    values:
      - helm-values/cert-manager.yaml
    needs: 
      - ingress-nginx/ingress-nginx

  - name: external-dns
    namespace: external-dns
    chart: external-dns/external-dns
    version: "1.19.0"
    values:
      - helm-values/external-dns.yaml
    needs: 
      - ingress-nginx/ingress-nginx
      
  - name: argocd
    namespace: argocd
    chart: argocd/argo-cd
    version: "9.0.5" 
    values:
      - helm-values/argocd.yaml
    needs: 
      - ingress-nginx/ingress-nginx
      - external-dns/external-dns
      - cert-manager/cert-manager

  - name: prometheus
    namespace: monitoring
    chart: prometheus/prometheus
    values:
      - helm-values/prometheus.yaml
    needs:
      - ingress-nginx/ingress-nginx
      - external-dns/external-dns
      - cert-manager/cert-manager

  - name: grafana
    namespace: monitoring
    chart: grafana/grafana
    values:
      - helm-values/grafana.yaml
    needs:
      - monitoring/prometheus
      - ingress-nginx/ingress-nginx
      - external-dns/external-dns
      - cert-manager/cert-manager

  - name: postgres
    namespace: app
    chart: bitnami/postgresql
    version: "16.7.27"
    values:
      - helm-values/postgres.yaml

  - name: redis
    namespace: app
    chart: bitnami/redis
    version: "20.11.3"
    values:
      - helm-values/redis.yaml

  - name: api-gateway
    namespace: app
    chart: ./charts/app
    values:
      - helm-values/app/api-gateway.yaml
    needs:
      - app/redis

  - name: dashboard-api
    namespace: app
    chart: ./charts/app
    values:
      - helm-values/app/dashboard-api.yaml
    needs:
      - app/postgres

  - name: inventory-service
    namespace: app
    chart: ./charts/app
    values:
      - helm-values/app/inventory-service.yaml
    needs:
      - app/postgres

  - name: notification-service
    namespace: app
    chart: ./charts/app
    values:
      - helm-values/app/notification-service.yaml
    needs:
      - app/postgres

  - name: order-service
    namespace: app
    chart: ./charts/app
    values:
      - helm-values/app/order-service.yaml
    needs:
      - app/postgres

  - name: payment-service
    namespace: app
    chart: ./charts/app
    values:
      - helm-values/app/payment-service.yaml
    needs:
      - app/postgres

  - name: scheduler
    namespace: app
    chart: ./charts/app
    values:
      - helm-values/app/scheduler.yaml
    needs:
      - app/postgres

  - name: shipping-service
    namespace: app
    chart: ./charts/app
    values:
      - helm-values/app/shipping-service.yaml
    needs:
      - app/postgres

  - name: worker
    namespace: app
    chart: ./charts/app
    values:
      - helm-values/app/worker.yaml
    needs:
      - app/order-service
      - app/payment-service
      - app/shipping-service
